<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Colourfull Box Layout</title>
    <style>
        * {
            margin: 5;
            padding: 5;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
        }

        
        header {
            background-color: #2563eb;
            color: white;
            text-align: center;
            padding: 4rem 2rem;
            width: 100%;
            
        }

        .main-container {
            max-width: 1500px;
            margin: 2rem auto;
            padding: 2 1rem;
        }

        .content-row {
            display: flex;
            gap: 2rem; 
            justify-content: center;
        }

        .box {
            flex: 10;
            max-width: 600px;
            height: 350px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 8px;
        }
        .box1 {
            background-color: #ef4444;
        }

        .box2 {
            background-color: #22c55e;
        }

        .box3 {
            background-color: #eab308;
        }

        footer {
            background-color: #4b5563;
            color: white;
            text-align: center;
            padding: 4rem 2rem;
            width: 100%;
            margin-top: 2rem;
        }
    </style>    

</head>
<body>
   
    <header>
        <h1>My Header</h1>
    </header>

    
    <div class="main-container">
        <div class="content-row">
            <div class="box box1">Box 1</div>
            <div class="box box2">Box 2</div>
            <div class="box box3">Box 3</div>
        </div>
    </div>

    
    <footer>
        <h2>My Footer</h2>
    </footer>
</body>
</html>
